stages:
  - build
  - deploy

variables:
  DEPLOY_USER: gitlab-runner
  DEPLOY_HOST: deployer.local

build-job:
  stage: build
  image: hugomods/hugo:exts-0.154.5
  script:
    - hugo --minify
  artifacts:
    paths:
      - public/
    expire_in: 1 hour

deploy-job:
  stage: deploy
  image: rsync:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - rsync -avz --delete public/ "${DEPLOY_USER}@${DEPLOY_HOST}:~/www/"

